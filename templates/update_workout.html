{% extends "base.html" %}

{% block content %}

<div class="update-container">

    <h2 class="title">Update Workout</h2>

    <form method="POST" action="/update_workout_submit" class="update-form">

        <input type="hidden" name="workout_id" value="{{ workout.id }}">

        <label>Exercise Name</label>
        <input type="text" name="exercise" value="{{ workout.exercise_name }}" required>

        <label>Sets</label>
        <input type="number" name="sets" value="{{ workout.sets }}" required>

        <label>Reps</label>
        <input type="number" name="reps" value="{{ workout.reps }}" required>

        <button type="submit" class="btn blue full">Save Changes</button>
        <a href="/dashboard" class="btn red full">Cancel</a>

    </form>

</div>

<style>
.update-container {
    max-width: 500px;
    margin: 40px auto;
    background: #ffffff;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(0,0,0,0.15);
}

.title {
    text-align: center;
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 25px;
    color: #222; /* Dark text – more visible */
}

.update-form label {
    color: #444; /* darker text */
    font-size: 16px;
    margin-bottom: 6px;
    display: block;
}

.update-form input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    margin-bottom: 18px;
    font-size: 16px;
    color: #222;
}

.btn.full {
    width: 100%;
    display: block;
    margin-top: 10px;
}

</style>

{% endblock %}
