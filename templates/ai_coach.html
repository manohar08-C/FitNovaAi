{% extends "base.html" %}
{% block content %}

<div class="main-layout">
    
<div class="sidebar">
    <h2 class="logo">FitNovaAI </h2>

    <a href="/dashboard" class="menu-btn">Dashboard</a>
    <a href="/profile" class="menu-btn">Profile</a>
    <a href="/ai_workout" class="menu-btn">AI Workout</a>
    <a href="/nutrition" class="menu-btn">Nutrition</a>
    <a href="/ai_food" class="menu-btn">AI Food Detection</a>
    <a href="/ai_coach" class="menu-btn {% if request.path == '/ai_coach' %}active{% endif %}">AI Coach</a>
    <a href="/ai_planner" class="menu-btn">AI Planner</a>
    <a href="/logout" class="menu-btn logout">Logout</a>

    <button onclick="toggleTheme()" class="theme-btn">🌗 Toggle Theme</button>
</div>


    <div class="content">

        <h1>AI Fitness Coach 🤖</h1>

        <div id="chatBox" style="height:400px; overflow-y:auto; margin-bottom:20px;"></div>

        <input type="text" id="userInput" placeholder="Ask your fitness question..." />
        <button onclick="sendMessage()">Send</button>

        <br><br>
        <button onclick="startVoiceChat()">🎤 Voice Input</button>

    </div>
</div>

<script>
function sendMessage() {
    const input = document.getElementById("userInput");
    const message = input.value;

    fetch("/ask_ai", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: message})
    })
    .then(res => res.json())
    .then(data => {
        const chatBox = document.getElementById("chatBox");
        chatBox.innerHTML += "<p><b>You:</b> " + message + "</p>";
        chatBox.innerHTML += "<p><b>AI:</b> " + data.reply + "</p>";
        input.value = "";
    });
}

function startVoiceChat() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = "en-US";

    recognition.start();

    recognition.onresult = function(event) {
        const transcript = event.results[0][0].transcript;
        document.getElementById("userInput").value = transcript;
    };
}
</script>

{% endblock %}
